<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Incident Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--bg: #0f0f0f;
--surface: #1a1a1a;
--surface2: #222;
--border: rgba(255,255,255,0.08);
--border2: rgba(255,255,255,0.14);
--text: #f0ede8;
--muted: #888;
--accent: #c8a96e;
--accent-dim: rgba(200,169,110,0.12);
--danger: #e05555;
--still: #e05555;
--still-bg: rgba(224,85,85,0.1);
--moving: #6e9e6e;
--moving-bg: rgba(110,158,110,0.1);
--minor: #888;
--minor-bg: rgba(136,136,136,0.1);
--radius: 8px;
--radius-lg: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 720px; margin: 0 auto; }
header { margin-bottom: 2.5rem; border-bottom: 0.5px solid var(--border2); padding-bottom: 1.5rem; }
header h1 { font-size: 22px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
header p { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.06em; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
input[type="date"], input[type="time"], input[type="text"], select, textarea {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius);
  color: var(--text); font-family: 'Courier New', Courier, monospace; font-size: 13px;
  padding: 8px 10px; outline: none; transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 64px; }
select option { background: #222; }
.radio-row { display: flex; gap: 1.5rem; flex-wrap: wrap; padding: 4px 0; }
.radio-row label { font-size: 12px; letter-spacing: 0.04em; text-transform: none; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; }
input[type="radio"] { accent-color: var(--accent); }
.btn-row { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
button { font-family: 'Courier New', Courier, monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 18px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--muted); transition: all 0.15s; }
button:hover { border-color: var(--accent); color: var(--accent); }
.btn-add { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.btn-export { margin-left: auto; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.stat-val { font-size: 22px; color: var(--text); }
.stat-val.accent { color: var(--accent); }
.section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.entry { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 8px; }
.entry-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.entry-time { font-size: 13px; color: var(--accent); letter-spacing: 0.06em; }
.badge { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
.badge-still { background: var(--still-bg); color: var(--still); border: 0.5px solid rgba(224,85,85,0.25); }
.badge-moving { background: var(--moving-bg); color: var(--moving); border: 0.5px solid rgba(110,158,110,0.25); }
.badge-minor { background: var(--minor-bg); color: var(--minor); border: 0.5px solid rgba(136,136,136,0.2); }
.badge-sound { background: var(--accent-dim); color: var(--accent); border: 0.5px solid rgba(200,169,110,0.25); }
.entry-field { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
.entry-field span { color: var(--text); }
.entry-del { margin-left: auto; font-size: 11px; padding: 2px 8px; border-color: transparent; color: var(--muted); }
.entry-del:hover { color: var(--danger); border-color: rgba(224,85,85,0.3); background: rgba(224,85,85,0.06); }
.empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 12px; letter-spacing: 0.06em; border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); }
@media (max-width: 500px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: 1; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Incident Log</h1>
    <p>Document suspicious sounds &amp; activity — build an objective pattern record</p>
  </header>
  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="inc-date" />
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="inc-time" />
      </div>
      <div class="form-group full">
        <label>Sound type</label>
        <select id="inc-sound">
          <option value="click">Click</option>
          <option value="bang">Bang</option>
          <option value="tap">Tap</option>
          <option value="creak">Creak / Footstep</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group full">
        <label>What were you doing at the moment?</label>
        <input type="text" id="inc-activity" placeholder="e.g. browsing, typing, sitting still..." />
      </div>
      <div class="form-group full">
        <label>Were you physically moving or making noise?</label>
        <div class="radio-row">
          <label><input type="radio" name="movement" value="no" checked /> Still &amp; silent</label>
          <label><input type="radio" name="movement" value="minor" /> Minor (mouse click, scroll)</label>
          <label><input type="radio" name="movement" value="yes" /> Yes — moving / audible</label>
        </div>
      </div>
      <div class="form-group full">
        <label>Notes (optional)</label>
        <textarea id="inc-notes" placeholder="Location of sound, anything else relevant..."></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-add" onclick="addEntry()">+ Add entry</button>
      <button onclick="clearForm()">Clear</button>
      <button class="btn-export" onclick="exportLog()">Export CSV ↓</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val accent" id="stat-total">0</div></div>
    <div class="stat"><div class="stat-label">Still &amp; silent</div><div class="stat-val" id="stat-still">0</div></div>
    <div class="stat"><div class="stat-label">Last 7 days</div><div class="stat-val" id="stat-week">0</div></div>
  </div>
  <div class="section-label">Log entries</div>
  <div id="log-list"><div class="empty">No entries yet.</div></div>
</div>
<script>
let entries = JSON.parse(localStorage.getItem('incident_entries') || '[]');

const now = new Date();
document.getElementById('inc-date').value = now.toISOString().split('T')[0];
document.getElementById('inc-time').value = now.toTimeString().slice(0,5);

function save() {
  localStorage.setItem('incident_entries', JSON.stringify(entries));
}

function getMovement() {
  return document.querySelector('input[name="movement"]:checked')?.value || 'no';
}

function addEntry() {
  const date = document.getElementById('inc-date').value;
  const time = document.getElementById('inc-time').value;
  const sound = document.getElementById('inc-sound').value;
  const activity = document.getElementById('inc-activity').value.trim();
  const movement = getMovement();
  const notes = document.getElementById('inc-notes').value.trim();
  if (!date || !time || !activity) { alert('Please fill in date, time, and activity.'); return; }
  entries.unshift({ id: Date.now(), date, time, sound, activity, movement, notes });
  save(); render(); clearForm();
  const n = new Date();
  document.getElementById('inc-date').value = n.toISOString().split('T')[0];
  document.getElementById('inc-time').value = n.toTimeString().slice(0,5);
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save(); render();
}

function clearForm() {
  document.getElementById('inc-activity').value = '';
  document.getElementById('inc-notes').value = '';
  document.getElementById('inc-sound').value = 'click';
  document.querySelector('input[name="movement"][value="no"]').checked = true;
}

function movementBadge(m) {
  if (m === 'no') return '<span class="badge badge-still">still &amp; silent</span>';
  if (m === 'yes') return '<span class="badge badge-moving">moving</span>';
  return '<span class="badge badge-minor">minor</span>';
}

function render() {
  const list = document.getElementById('log-list');
  const total = entries.length;
  const still = entries.filter(e => e.movement === 'no').length;
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const week = entries.filter(e => new Date(e.date) >= weekAgo).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-still').textContent = still;
  document.getElementById('stat-week').textContent = week;
  if (!entries.length) { list.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
  list.innerHTML = entries.map(e => `
    <div class="entry">
      <div class="entry-header">
        <span class="entry-time">${e.date} &nbsp;${e.time}</span>
        <span class="badge badge-sound">${e.sound}</span>
        ${movementBadge(e.movement)}
        <button class="entry-del" onclick="deleteEntry(${e.id})">remove</button>
      </div>
      <div class="entry-field">Activity: <span>${e.activity}</span></div>
      ${e.notes ? `<div class="entry-field">Notes: <span>${e.notes}</span></div>` : ''}
    </div>
  `).join('');
}

function exportLog() {
  if (!entries.length) { alert('No entries to export.'); return; }
  const header = 'Date,Time,Sound,Activity,Movement,Notes\n';
  const rows = entries.map(e =>
    [e.date, e.time, e.sound, `"${e.activity}"`, e.movement, `"${e.notes}"`].join(',')
  ).join('\n');
  const csv = header + rows;
  let box = document.getElementById('csv-output');
  if (!box) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'margin-top:1rem;';
    wrap.innerHTML = `
      <div class="section-label" style="margin-bottom:8px;">CSV output — select all &amp; copy</div>
      <textarea id="csv-output" style="width:100%;min-height:140px;font-size:11px;background:var(--surface2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--radius);padding:10px;font-family:'Courier New',monospace;resize:vertical;" readonly></textarea>`;
    document.querySelector('.btn-row').after(wrap);
    box = document.getElementById('csv-output');
  }
  box.value = csv;
  box.select();
}

render();
</script>
</body>
</html>
